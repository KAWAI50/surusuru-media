<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>受講生メディア紹介</title>
  <meta name="description" content="受講生さんのInstagram、YouTube、公式LINEなどのメディア紹介ページです。" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <span class="eyebrow">Student Media Gallery</span>
    <h1>受講生さんのメディア紹介</h1>
    <p class="lead">Instagram・YouTube・公式LINE・オープンチャットなど、受講生さんの活動や発信を見やすくまとめました。</p>
  </header>

  <div class="toolbar">
    <input id="search" type="search" placeholder="名前・肩書き・活動内容で検索" aria-label="検索" />
    <select id="term"><option value="">すべての期</option></select>
    <select id="media"><option value="">すべてのメディア</option></select>
  </div>
  <div class="count" id="count"></div>
  <main class="grid" id="cards"></main>
  <div class="empty" id="empty" hidden>該当する受講生さんが見つかりませんでした。</div>
  <footer class="footer">掲載内容はアンケート回答をもとに作成しています。</footer>

  <script src="data.js"></script>
  <script>
    const icons = {
      'Instagram': `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5"></rect><circle cx="12" cy="12" r="4"></circle><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"></circle></svg>`,
      'YouTube': `<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M21.6 7.2s-.2-1.5-.8-2.1c-.8-.8-1.6-.8-2-.9C16 4 12 4 12 4s-4 0-6.8.2c-.4.1-1.2.1-2 .9-.6.6-.8 2.1-.8 2.1S2 9 2 10.9v1.8c0 1.9.4 3.7.4 3.7s.2 1.5.8 2.1c.8.8 1.8.8 2.2.9 1.6.2 6.6.2 6.6.2s4 0 6.8-.2c.4-.1 1.2-.1 2-.9.6-.6.8-2.1.8-2.1s.4-1.8.4-3.7v-1.8c0-1.9-.4-3.7-.4-3.7zM10 15.3V8.7l5.8 3.3L10 15.3z"/></svg>`,
      'TikTok': `<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M16 3c.5 3 2.2 4.8 5 5v3.1c-1.9.1-3.6-.6-5-1.8v6.6c0 3.4-2.7 5.9-6.1 5.9A5.8 5.8 0 0 1 4 16c0-3.7 3.4-6.4 7-5.7v3.2c-1.7-.5-3.6.7-3.6 2.5 0 1.5 1.1 2.6 2.6 2.6 1.6 0 2.8-1.1 2.8-2.9V3H16z"/></svg>`,
      '公式LINE': `<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 3C6.5 3 2 6.6 2 11c0 3.9 3.5 7.1 8.2 7.8.3.1.7.2.8.5.1.2.1.6 0 .8l-.1.7c-.1.4-.3 1 .9.5 1.2-.5 6.5-3.8 8.8-6.5.9-1 1.4-2.3 1.4-3.8 0-4.4-4.5-8-10-8z"/></svg>`,
      'オープンチャット': `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4 8.7 8.7 0 0 1-3.9-.9L3 20l1.4-4.5A8.2 8.2 0 0 1 3 11.5C3 6.8 7 3 12 3s9 3.8 9 8.5z"/></svg>`,
      'メルマガ': `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="m4 7 8 6 8-6"/></svg>`,
      'リンク': `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1"/><path d="M14 11a5 5 0 0 0-7.1 0l-2 2A5 5 0 0 0 12 20l1.1-1.1"/></svg>`
    };
    const escapeHtml = (s='') => String(s).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
    const initial = name => [...name.trim()][0] || '＊';
    const cards = document.getElementById('cards');
    const search = document.getElementById('search');
    const term = document.getElementById('term');
    const media = document.getElementById('media');
    const count = document.getElementById('count');
    const empty = document.getElementById('empty');
    function setOptions(){
      [...new Set(STUDENTS.map(s=>s.term).filter(Boolean))].sort().forEach(v => term.insertAdjacentHTML('beforeend', `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`));
      [...new Set(STUDENTS.flatMap(s=>s.media.map(m=>m.type)))].sort().forEach(v => media.insertAdjacentHTML('beforeend', `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`));
    }
    function render(){
      const q = search.value.trim().toLowerCase();
      const selectedTerm = term.value;
      const selectedMedia = media.value;
      const filtered = STUDENTS.filter(s => {
        const hay = [s.name,s.term,s.title,s.activity,s.appeal, ...s.media.flatMap(m=>[m.type,m.title])].join(' ').toLowerCase();
        return (!q || hay.includes(q)) && (!selectedTerm || s.term === selectedTerm) && (!selectedMedia || s.media.some(m=>m.type === selectedMedia));
      });
      cards.innerHTML = filtered.map(s => `
        <article class="card">
          <div class="top">
            <div class="avatar">${escapeHtml(initial(s.name))}</div>
            <div><h2 class="name">${escapeHtml(s.name)}</h2><div class="meta">${escapeHtml(s.term || '')}</div>${s.title ? `<span class="badge">${escapeHtml(s.title)}</span>` : ''}</div>
          </div>
          ${s.activity ? `<div><div class="section-title">活動内容</div><p class="text activity">${escapeHtml(s.activity)}</p></div>` : ''}
          ${s.appeal ? `<div><div class="section-title">発信内容・魅力</div><p class="text appeal">${escapeHtml(s.appeal)}</p></div>` : ''}
          <div class="links">${s.media.map(m => m.url ? `<a class="media-link" href="${escapeHtml(m.url)}" target="_blank" rel="noopener"><span class="icon">${icons[m.type] || icons['リンク']}</span>${escapeHtml(m.type)}</a>` : `<span class="media-link"><span class="icon">${icons[m.type] || icons['リンク']}</span>${escapeHtml(m.title || m.type)}</span>`).join('')}</div>
        </article>`).join('');
      count.textContent = `${filtered.length}件表示中 / 全${STUDENTS.length}件`;
      empty.hidden = filtered.length !== 0;
    }
    setOptions(); render();
    [search, term, media].forEach(el => el.addEventListener('input', render));
  </script>
</body>
</html>
